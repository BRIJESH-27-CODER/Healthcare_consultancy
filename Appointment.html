    <div class="container mt-5">
      <div class="appointment-form">
          <h2 class="text-center">Schedule an Appointment</h2>
          <form action="Website.html" method="post">
              <div class="form-group">
                  <label for="name">Full Name</label>
                  <input type="text" class="form-control" id="name" placeholder="Enter your full name" required>
              </div>
              <div class="form-group">
                  <label for="email">Email Address</label>
                  <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
              </div>
              <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
              </div>
              <div class="form-group">
                  <label for="date">Preferred Date</label>
                  <input type="date" class="form-control" id="date" required>
              </div>
              <div class="form-group">
                  <label for="time">Preferred Time</label>
                  <input type="time" class="form-control" id="time" required>
              </div>
              <div class="form-group">
                  <label for="message">Additional Information</label>
                  <textarea class="form-control" id="message" rows="3" placeholder="Any specific concerns?"></textarea>
              </div>
              <button type="submit" btn btn-primary btn-block>Book Appointment</button>
            
          </form>
          
      </div>
